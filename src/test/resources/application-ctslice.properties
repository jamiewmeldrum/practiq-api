# Component-test slice environment. Supplies a no-op datasource so the web layer can be
# tested without a real database. Activated only by *CT tests via
# @MicronautTest(environments = "ctslice"), so integration tests (*IT) are unaffected.
#
# Stop the Test Resources Postgres container from starting at all. With it disabled, the
# resolver falls back to the explicit (no-op) datasource.default.url below.
test-resources.containers.postgres.enabled=false
datasources.default.url=jdbc:postgresql://localhost:65432/ct-no-db
datasources.default.driver-class-name=org.postgresql.Driver
# Hikari must not open a connection eagerly.
datasources.default.initialization-fail-timeout=-1
datasources.default.minimum-idle=0
# Flyway off — nothing to migrate.
flyway.datasources.default.enabled=false
# Hibernate must build the SessionFactory without probing JDBC metadata for the dialect.
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jpa.default.properties.hibernate.boot.allow_jdbc_metadata_access=false
jpa.default.properties.hibernate.temp.use_jdbc_metadata_defaults=false
