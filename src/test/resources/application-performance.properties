# Performance tier: the same real-Postgres stack as integration tests (Testcontainers via Test
# Resources — the `test` environment is active too, pinning the PG16 image), with Hibernate statistics
# enabled so *PT tests can assert the number of JDBC statements a single request fires. That count is
# what surfaces an N+1: an eager association shows up as extra prepared statements even though it isn't a
# distinct query.
jpa.default.properties.hibernate.generate_statistics=true
